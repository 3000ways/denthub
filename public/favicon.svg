<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Beige circle background -->
  <circle cx="32" cy="32" r="32" fill="#F5ECD7"/>

  <!-- Desert mountains -->
  <ellipse cx="18" cy="42" rx="16" ry="10" fill="#C4A882"/>
  <ellipse cx="46" cy="42" rx="16" ry="10" fill="#C4A882"/>
  <ellipse cx="32" cy="46" rx="20" ry="8" fill="#D4B896"/>

  <!-- Road -->
  <path d="M32 62 L18 40 L32 38 L46 40 Z" fill="#2D6A4F"/>
  <!-- Road dashes -->
  <rect x="31" y="42" width="2" height="5" fill="#F5ECD7" rx="1"/>
  <rect x="31" y="50" width="2" height="4" fill="#F5ECD7" rx="1"/>

  <!-- Microphone body -->
  <rect x="27" y="10" width="10" height="14" rx="5" fill="#2D6A4F"/>
  <!-- Microphone stand -->
  <rect x="31" y="24" width="2" height="5" fill="#2D6A4F"/>
  <rect x="27" y="28" width="10" height="2" rx="1" fill="#2D6A4F"/>

  <!-- Sound wave bars - left -->
  <rect x="16" y="16" width="2.5" height="6" rx="1" fill="#2D6A4F"/>
  <rect x="20" y="13" width="2.5" height="9" rx="1" fill="#2D6A4F"/>
  <rect x="24" y="15" width="2.5" height="7" rx="1" fill="#2D6A4F"/>

  <!-- Sound wave bars - right -->
  <rect x="45.5" y="16" width="2.5" height="6" rx="1" fill="#2D6A4F"/>
  <rect x="41.5" y="13" width="2.5" height="9" rx="1" fill="#2D6A4F"/>
  <rect x="37.5" y="15" width="2.5" height="7" rx="1" fill="#2D6A4F"/>

  <!-- Clip to circle -->
  <clipPath id="c"><circle cx="32" cy="32" r="32"/></clipPath>
</svg>
